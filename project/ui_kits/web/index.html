<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Human Future Hub — Website UI Kit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="root"></div>

  <!-- Tweaks panel (visible when toolbar Tweaks is on) -->
  <div class="hfh-tweaks" id="tweaks">
    <div class="hfh-tweaks__h">Tweaks</div>
    <div class="hfh-tweaks__row">
      <label>Hero accent</label>
      <div class="hfh-tweaks__opts" id="accent-opts"></div>
    </div>
    <div class="hfh-tweaks__row">
      <label>Rhythm</label>
      <div class="hfh-tweaks__opts" id="rhythm-opts"></div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Pieces.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "orange",
      "rhythm": "airy"
    }/*EDITMODE-END*/;

    const PROGRAMMES = [
      { eyebrow: 'Future of Education', title: 'Educate the Educator', description: 'A structured AI literacy track for teachers and parents who want practical ground to stand on — not hype, not fear.', meta: ['6 weeks', 'Berlin + online', '2026 cohort'] },
      { eyebrow: 'Future of Work', title: 'Practitioner circles', description: 'Small-group sessions for people thinking seriously about AI inside their organisation. Peer-to-peer, not broadcast.', meta: ['Monthly', 'Closed group'] },
      { eyebrow: 'Partnerships', title: 'Pilot programmes', description: 'We work with schools and employers to build pilots rooted in real context — never generic frameworks.', meta: ['Custom', 'Contact us'] },
    ];

    const EVENTS = [
      { date: '12 Nov', tag: 'Workshop', title: "The realist's guide to classroom AI", place: 'Kulturbrauerei, Berlin', seats: 38 },
      { date: '28 Nov', tag: 'Roundtable', title: 'What teachers actually need from AI tooling', place: 'Online · Europe', seats: 12 },
      { date: '04 Dec', tag: 'Talk', title: 'AI agency, acceleration, governance', place: 'Silent Green, Berlin', seats: 64 },
    ];

    const POSTS = [
      { date: '2026-04-02', title: 'A springboard, not a crisis', summary: 'You turned it into a springboard — raising questions about AI agency and acceleration.', src: 'Substack' },
      { date: '2026-03-18', title: "The Silicon Valley narrative is loud", summary: "It's too well funded, so conversations like ours are how we make sure it isn't the only one.", src: 'Substack' },
      { date: '2026-03-01', title: 'Why we don\'t start with the tools', summary: 'Teachers in Germany have no structured AI support. That\'s the problem worth solving.', src: 'LinkedIn' },
    ];

    function Home({ onNav }) {
      return (<>
        <Hero onCTA={onNav} />
        <section className="hfh-section">
          <div className="hfh-section__inner">
            <div className="hfh-section__head">
              <div>
                <div className="hfh-section__eyebrow">What we do</div>
                <h2 className="hfh-section__title">Two pillars. One conviction — nobody is left behind.</h2>
              </div>
              <p className="hfh-section__sub">We focus on the two places where AI is reshaping human lives fastest: education and work.</p>
            </div>
            <div className="hfh-prog-grid">
              {PROGRAMMES.map(p => <ProgrammeCard key={p.title} {...p} onClick={() => onNav('programmes')} />)}
            </div>
          </div>
        </section>
        <PullQuote
          quote="Technology is the context. The human experience is the subject."
          emphasis="The human experience is the subject."
          attrib="HFH positioning guardrails · April 2026" />
        <section className="hfh-section">
          <div className="hfh-section__inner">
            <div className="hfh-section__head">
              <div>
                <div className="hfh-section__eyebrow">Upcoming</div>
                <h2 className="hfh-section__title">Events and workshops</h2>
              </div>
              <p className="hfh-section__sub">In Berlin and online. Small rooms, specific questions, no keynote theatre.</p>
            </div>
            <div className="hfh-events">
              {EVENTS.map(e => <EventRow key={e.title} {...e} />)}
            </div>
          </div>
        </section>
        <CTABand onJoin={() => onNav('programmes')} />
      </>);
    }

    function Programmes() {
      return (
        <main className="hfh-page">
          <div className="hfh-page__eyebrow">Flagship programme · Future of Education</div>
          <h1 className="hfh-page__title">Educate the Educator</h1>
          <p className="hfh-page__lede">
            Teachers in Germany have no structured AI support. We're building a six-week
            programme that gives them practical ground to stand on — with parents in
            the room, not on the margins.
          </p>
          <div className="hfh-prog-grid">
            <ProgrammeCard eyebrow="Week 1–2" title="Mapping the territory" description="What's changing in classrooms, what isn't, and what teachers are already doing about it." meta={['2 sessions', 'Live + async']} />
            <ProgrammeCard eyebrow="Week 3–4" title="Tools in context" description="Honest reviews. No vendor decks. What works, what leaks, what to avoid." meta={['2 sessions', 'Workshop']} />
            <ProgrammeCard eyebrow="Week 5–6" title="Building a pilot" description="Each participant leaves with a concrete pilot for their own classroom or school." meta={['Final review']} />
          </div>
        </main>
      );
    }

    function Events() {
      return (
        <main className="hfh-page">
          <div className="hfh-page__eyebrow">Events</div>
          <h1 className="hfh-page__title">Small rooms, specific questions.</h1>
          <p className="hfh-page__lede">We run workshops, roundtables, and evenings with practitioners. No keynote theatre.</p>
          <div className="hfh-events">
            {EVENTS.map(e => <EventRow key={e.title} {...e} />)}
            {EVENTS.map(e => <EventRow key={e.title + '2'} {...e} date={'18 Dec'} title={'Parents and AI — a conversation'} tag="Evening" seats={22} />).slice(0,1)}
          </div>
        </main>
      );
    }

    function Write() {
      return (
        <main className="hfh-page">
          <div className="hfh-page__eyebrow">Writing</div>
          <h1 className="hfh-page__title">Thinking out loud.</h1>
          <p className="hfh-page__lede">Essays, field notes, and the occasional long answer. Systemic, not reactive.</p>
          <div className="hfh-posts">
            {POSTS.map(p => (
              <article className="hfh-post" key={p.title}>
                <div className="hfh-post__date">{p.date}</div>
                <div>
                  <h3 className="hfh-post__title">{p.title}</h3>
                  <p className="hfh-post__summary">{p.summary}</p>
                </div>
                <span className="hfh-post__src">{p.src}</span>
              </article>
            ))}
          </div>
        </main>
      );
    }

    function App() {
      const [route, setRoute] = React.useState(() => localStorage.getItem('hfh-route') || 'home');
      const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
      const [editOn, setEditOn] = React.useState(false);

      React.useEffect(() => { localStorage.setItem('hfh-route', route); window.scrollTo(0,0); }, [route]);

      // Tweaks protocol
      React.useEffect(() => {
        const onMsg = (e) => {
          if (e.data?.type === '__activate_edit_mode') setEditOn(true);
          if (e.data?.type === '__deactivate_edit_mode') setEditOn(false);
        };
        window.addEventListener('message', onMsg);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      React.useEffect(() => {
        const el = document.getElementById('tweaks');
        el.classList.toggle('is-on', editOn);

        const renderOpts = (id, key, opts) => {
          const host = document.getElementById(id);
          host.innerHTML = '';
          opts.forEach(o => {
            const b = document.createElement('div');
            b.className = 'hfh-tweaks__opt' + (tweaks[key] === o ? ' is-on' : '');
            b.textContent = o;
            b.onclick = () => {
              const next = { ...tweaks, [key]: o };
              setTweaks(next);
              window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: o } }, '*');
            };
            host.appendChild(b);
          });
        };
        renderOpts('accent-opts', 'accent', ['orange', 'teal', 'purple']);
        renderOpts('rhythm-opts', 'rhythm', ['airy', 'dense']);
      }, [editOn, tweaks]);

      // Apply tweaks via CSS vars
      React.useEffect(() => {
        const root = document.documentElement;
        const accentMap = { orange: '#FF6D4D', teal: '#2DA094', purple: '#5E17EB' };
        root.style.setProperty('--hfh-orange', accentMap[tweaks.accent] || '#FF6D4D');
        const rhythm = tweaks.rhythm === 'dense' ? '56px' : '96px';
        document.querySelectorAll('.hfh-section').forEach(s => s.style.paddingTop = s.style.paddingBottom = rhythm);
      }, [tweaks]);

      const page = {
        home: <Home onNav={setRoute} />,
        programmes: <Programmes />,
        events: <Events />,
        write: <Write />,
        join: <Programmes />,
      }[route] || <Home onNav={setRoute} />;

      return (
        <>
          <Nav route={route} onNav={setRoute} />
          {page}
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
