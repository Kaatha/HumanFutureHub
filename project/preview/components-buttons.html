<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html,body{margin:0;background:var(--bg-1);font-family:var(--font-body);padding:22px 28px;}
    .row{display:flex;flex-wrap:wrap;gap:12px;align-items:center;}
    .btn{font-family:var(--font-body);font-weight:600;font-size:15px;padding:10px 20px;border-radius:var(--radius-sm);border:1px solid transparent;cursor:pointer;transition:all 160ms cubic-bezier(0.2,0.8,0.2,1);}
    .primary{background:var(--hfh-blue);color:#fff;}
    .primary:hover{background:var(--hfh-blue-900);}
    .secondary{background:transparent;color:var(--hfh-blue);border-color:var(--hfh-blue);}
    .secondary:hover{background:var(--hfh-blue-50);}
    .tertiary{background:transparent;color:var(--hfh-blue);padding-left:4px;padding-right:4px;}
    .tertiary:hover{color:var(--hfh-orange);}
    .accent{background:var(--hfh-orange);color:#fff;}
    .accent:hover{background:var(--hfh-orange-700);}
    .teal-solid{background:var(--hfh-teal);color:#fff;}
    .teal-solid:hover{background:var(--hfh-teal-700);color:#fff;}
    .teal-outline{background:transparent;color:var(--hfh-teal-700);border-color:var(--hfh-teal);}
    .teal-outline:hover{background:var(--hfh-teal-50);}
    .row-label{font-size:10.5px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-3);margin:10px 0 8px;}
    .pill{border-radius:var(--radius-pill);padding:8px 18px;font-size:13px;}
    .tag{background:var(--hfh-teal-50);color:var(--hfh-teal-700);border-radius:var(--radius-pill);padding:4px 12px;font-size:12px;font-weight:600;border:0;}
    .tag.blue{background:var(--hfh-blue-50);color:var(--hfh-blue);}
    .tag.orange{background:var(--hfh-orange-50);color:var(--hfh-orange-700);}
  </style>
</head>
<body>
  <div class="row-label">Blue · primary</div>
  <div class="row" style="margin-bottom:6px;">
    <button class="btn primary">Join the programme</button>
    <button class="btn secondary">Read more</button>
    <button class="btn tertiary">Learn more →</button>
    <button class="btn accent">Book a seat</button>
  </div>
  <div class="row-label">Teal · support</div>
  <div class="row" style="margin-bottom:14px;">
    <button class="btn teal-solid">See the programme</button>
    <button class="btn teal-outline">Download the brief</button>
    <button class="btn teal-solid pill">Subscribe</button>
  </div>
  <div class="row">
    <span class="tag blue">Future of Work</span>
    <span class="tag">Future of Education</span>
    <span class="tag orange">Workshop · 10 Nov</span>
  </div>
</body>
</html>
