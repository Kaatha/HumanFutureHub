<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html,body{margin:0;background:var(--bg-1);font-family:var(--font-body);}
    .wrap{padding:18px 24px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
    .tok{border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;background:#fff;}
    .sw{width:100%;height:40px;border-radius:var(--radius-xs);margin-bottom:10px;border:1px solid var(--border);}
    .name{font-size:12px;font-weight:600;color:var(--fg-1);}
    .var{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-3);margin-top:2px;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="tok"><div class="sw" style="background:#0B1420;"></div><div class="name">fg-1 / ink</div><div class="var">#0B1420</div></div>
    <div class="tok"><div class="sw" style="background:#2A3647;"></div><div class="name">fg-2</div><div class="var">#2A3647</div></div>
    <div class="tok"><div class="sw" style="background:#5A6778;"></div><div class="name">fg-3 / muted</div><div class="var">#5A6778</div></div>
    <div class="tok"><div class="sw" style="background:#8A94A4;"></div><div class="name">fg-4 / placeholder</div><div class="var">#8A94A4</div></div>
    <div class="tok"><div class="sw" style="background:#FFFFFF;"></div><div class="name">surface</div><div class="var">#FFFFFF</div></div>
    <div class="tok"><div class="sw" style="background:#F7F8FB;"></div><div class="name">surface-2</div><div class="var">#F7F8FB</div></div>
    <div class="tok"><div class="sw" style="background:#EEF1F6;"></div><div class="name">surface-3</div><div class="var">#EEF1F6</div></div>
    <div class="tok"><div class="sw" style="background:#E3E7EE;"></div><div class="name">border</div><div class="var">#E3E7EE</div></div>
  </div>
</body>
</html>
