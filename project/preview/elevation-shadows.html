<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html,body{margin:0;background:var(--surface-2);font-family:var(--font-body);padding:28px 32px;}
    .row{display:flex;gap:20px;justify-content:space-around;}
    .card{width:150px;height:92px;background:#fff;border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:12px 14px;}
    .lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
    .s1{box-shadow:0 1px 2px rgba(15,46,99,0.06), 0 1px 1px rgba(15,46,99,0.04);}
    .s2{box-shadow:0 4px 12px rgba(15,46,99,0.08), 0 1px 2px rgba(15,46,99,0.04);}
    .s3{box-shadow:0 12px 32px rgba(15,46,99,0.12), 0 2px 4px rgba(15,46,99,0.04);}
  </style>
</head>
<body>
  <div class="row">
    <div class="card s1"><div class="lbl">shadow-1 · rest</div></div>
    <div class="card s2"><div class="lbl">shadow-2 · hover</div></div>
    <div class="card s3"><div class="lbl">shadow-3 · floating</div></div>
  </div>
</body>
</html>
