<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html,body{margin:0;background:var(--bg-1);font-family:var(--font-body);}
    .grid{padding:20px 24px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
    .sw{border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border);}
    .chip{height:110px;display:flex;align-items:flex-end;padding:12px 14px;color:#fff;font-family:var(--font-display);font-weight:700;font-size:22px;letter-spacing:-0.01em;}
    .meta{padding:10px 14px;background:#fff;}
    .name{font-size:13px;font-weight:600;color:var(--fg-1);}
    .hex{font-family:var(--font-mono);font-size:12px;color:var(--fg-3);margin-top:2px;}
  </style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#1B4A9B;">Blue</div><div class="meta"><div class="name">HFH Blue</div><div class="hex">#1B4A9B · primary</div></div></div>
    <div class="sw"><div class="chip" style="background:#52CBBE;color:#0B1420;">Teal</div><div class="meta"><div class="name">HFH Teal</div><div class="hex">#52CBBE · primary</div></div></div>
    <div class="sw"><div class="chip" style="background:#FF6D4D;">Orange</div><div class="meta"><div class="name">HFH Orange</div><div class="hex">#FF6D4D · accent</div></div></div>
    <div class="sw"><div class="chip" style="background:#5E17EB;">Purple</div><div class="meta"><div class="name">HFH Purple</div><div class="hex">#5E17EB · support</div></div></div>
  </div>
</body>
</html>
