<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html,body{margin:0;background:var(--bg-1);font-family:var(--font-body);padding:22px 28px;}
    .row{display:flex;gap:14px;align-items:flex-end;justify-content:space-around;}
    .s{display:flex;flex-direction:column;align-items:center;gap:6px;}
    .box{background:var(--hfh-blue-200);border-radius:var(--radius-xs);}
    .lbl{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-3);}
  </style>
</head>
<body>
  <div class="row">
    <div class="s"><div class="box" style="width:4px;height:4px;"></div><div class="lbl">1 · 4</div></div>
    <div class="s"><div class="box" style="width:8px;height:8px;"></div><div class="lbl">2 · 8</div></div>
    <div class="s"><div class="box" style="width:12px;height:12px;"></div><div class="lbl">3 · 12</div></div>
    <div class="s"><div class="box" style="width:16px;height:16px;"></div><div class="lbl">4 · 16</div></div>
    <div class="s"><div class="box" style="width:24px;height:24px;"></div><div class="lbl">5 · 24</div></div>
    <div class="s"><div class="box" style="width:32px;height:32px;"></div><div class="lbl">6 · 32</div></div>
    <div class="s"><div class="box" style="width:48px;height:48px;"></div><div class="lbl">7 · 48</div></div>
    <div class="s"><div class="box" style="width:64px;height:64px;"></div><div class="lbl">8 · 64</div></div>
  </div>
</body>
</html>
