<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html,body{margin:0;background:var(--bg-1);font-family:var(--font-body);padding:20px 26px;color:var(--fg-2);font-size:13px;line-height:1.5;}
    .g{display:grid;grid-template-columns:1fr 1fr;gap:16px 28px;}
    .col h5{font-family:var(--font-display);font-weight:700;color:var(--hfh-blue);margin:0 0 8px;font-size:15px;letter-spacing:-0.01em;}
    .do::before{content:"✓";color:var(--hfh-teal-700);font-weight:700;margin-right:8px;}
    .dont::before{content:"×";color:var(--hfh-orange-700);font-weight:700;margin-right:8px;}
    ul{margin:0;padding:0;list-style:none;}
    li{padding:4px 0;}
  </style>
</head>
<body>
  <div class="g">
    <div class="col">
      <h5>Do</h5>
      <ul>
        <li class="do">Sound like a person wrote it.</li>
        <li class="do">Name specifics — countries, numbers.</li>
        <li class="do">State positions confidently.</li>
        <li class="do">Discuss systemic AI impact.</li>
      </ul>
    </div>
    <div class="col">
      <h5>Avoid</h5>
      <ul>
        <li class="dont">"We educate. We connect. We empower."</li>
        <li class="dont">Corporate HR-speak, boilerplate.</li>
        <li class="dont">Hedging, over-qualification.</li>
      </ul>
    </div>
  </div>
</body>
</html>
