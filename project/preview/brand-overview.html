<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html,body{margin:0;background:var(--bg-1);color:var(--fg-1);font-family:var(--font-body);}
    .card{padding:24px 28px;display:flex;align-items:center;gap:28px;min-height:120px;}
    .mark{width:84px;height:84px;flex:none;display:grid;place-items:center;background:var(--surface-2);border-radius:var(--radius-md);overflow:hidden;}
    .mark img{width:64px;height:64px;object-fit:contain;}
    .meta{display:flex;flex-direction:column;gap:4px;}
    .brand-name{font-family:var(--font-display);font-weight:800;font-size:28px;color:var(--hfh-blue);line-height:1;letter-spacing:-0.01em;}
    .tagline{font-size:14px;color:var(--fg-3);}
    .chips{display:flex;gap:6px;margin-top:8px;}
    .chip{font-family:var(--font-body);font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:4px 8px;border-radius:var(--radius-pill);}
    .c1{background:var(--hfh-blue);color:#fff;}
    .c2{background:var(--hfh-teal-50);color:var(--hfh-teal-700);}
    .c3{background:var(--hfh-orange-50);color:var(--hfh-orange-700);}
  </style>
</head>
<body>
  <div class="card">
    <div class="mark"><img src="../assets/flower-mark.png" alt=""></div>
    <div class="meta">
      <div class="brand-name">Human Future Hub</div>
      <div class="tagline">AI realists, not evangelists · Berlin · est. 2024</div>
      <div class="chips">
        <span class="chip c1">Future of Work</span>
        <span class="chip c2">Future of Education</span>
        <span class="chip c3">Educate the Educator</span>
      </div>
    </div>
  </div>
</body>
</html>
