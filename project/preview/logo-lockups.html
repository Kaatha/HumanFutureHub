<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html,body{margin:0;background:var(--bg-1);font-family:var(--font-body);}
    .wrap{padding:20px 24px;display:flex;gap:14px;align-items:stretch;}
    .logo{flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-md);display:grid;place-items:center;padding:14px;min-height:180px;}
    .logo.dark{background:var(--hfh-blue);}
    .logo img{max-width:100%;max-height:150px;object-fit:contain;}
    .label{position:absolute;bottom:8px;left:12px;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-3);}
    .logo.dark .label{color:rgba(255,255,255,0.7);}
    .logo-wrap{position:relative;flex:1;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo-wrap"><div class="logo"><img src="../assets/logo-full.png" alt=""></div><div class="label">Primary · on white</div></div>
    <div class="logo-wrap"><div class="logo"><img src="../assets/flower-mark.png" alt=""></div><div class="label">Flower mark</div></div>
    <div class="logo-wrap"><div class="logo dark"><img src="../assets/logo-alt.png" alt=""></div><div class="label">Stacked · reversed</div></div>
  </div>
</body>
</html>
