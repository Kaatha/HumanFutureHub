<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html,body{margin:0;background:var(--bg-1);font-family:var(--font-body);padding:22px 28px;}
    .row{display:flex;gap:14px;align-items:flex-start;justify-content:space-between;}
    .s{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;}
    .shape{width:68px;height:68px;background:var(--hfh-teal-200);border:1px solid var(--hfh-teal);}
    .lbl{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-3);text-align:center;}
    .n{font-size:12px;font-weight:600;color:var(--fg-1);}
  </style>
</head>
<body>
  <div class="row">
    <div class="s"><div class="shape" style="border-radius:4px;"></div><div class="n">xs · 4</div><div class="lbl">chips, inputs</div></div>
    <div class="s"><div class="shape" style="border-radius:8px;"></div><div class="n">sm · 8</div><div class="lbl">buttons</div></div>
    <div class="s"><div class="shape" style="border-radius:12px;"></div><div class="n">md · 12</div><div class="lbl">cards</div></div>
    <div class="s"><div class="shape" style="border-radius:20px;"></div><div class="n">lg · 20</div><div class="lbl">hero cards</div></div>
    <div class="s"><div class="shape" style="border-radius:999px;"></div><div class="n">pill</div><div class="lbl">tags, avatars</div></div>
    <div class="s"><div class="shape" style="border-radius:62% 38% 56% 44% / 54% 48% 52% 46%;"></div><div class="n">petal</div><div class="lbl">brand blob</div></div>
  </div>
</body>
</html>
