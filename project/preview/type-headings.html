<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html,body{margin:0;background:var(--bg-1);font-family:var(--font-body);padding:20px 28px;}
    .row{display:flex;align-items:baseline;gap:18px;padding:6px 0;border-bottom:1px dashed var(--border);}
    .row:last-child{border-bottom:0;}
    .sample{color:var(--hfh-blue);font-family:var(--font-display);font-weight:700;letter-spacing:-0.01em;line-height:1.05;flex:1;}
    .meta{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-3);width:200px;text-align:right;}
  </style>
</head>
<body>
  <div class="row"><div class="sample" style="font-size:60px;font-weight:800;letter-spacing:-0.02em;">Heading one</div><div class="meta">h1 · 60/1.02 · 800</div></div>
  <div class="row"><div class="sample" style="font-size:44px;">Heading two</div><div class="meta">h2 · 44/1.15 · 700</div></div>
  <div class="row"><div class="sample" style="font-size:32px;">Heading three</div><div class="meta">h3 · 32/1.15 · 700</div></div>
  <div class="row"><div class="sample" style="font-size:24px;font-weight:600;">Heading four</div><div class="meta">h4 · 24/1.15 · 600</div></div>
</body>
</html>
